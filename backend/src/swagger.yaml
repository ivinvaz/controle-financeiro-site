openapi: 3.0.0

info:
  title: API Controle Financeiro
  description: |
    API responsável pelo gerenciamento de usuários,
    transações financeiras, categorias, tipos e metas.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Servidor Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Usuario:
      type: object
      properties:
        _id:
          type: string
          example: 6642b9c7f7a31d2d4a6f1234

        nome:
          type: string
          example: Gabriel Pereira

        email:
          type: string
          example: gabriel@email.com

        profissao:
          type: string
          example: Desenvolvedor

        role:
          type: string
          example: usuario

    UsuarioInput:
      type: object
      required:
        - nome
        - email
        - senha
      properties:
        nome:
          type: string

        email:
          type: string

        senha:
          type: string

        profissao:
          type: string

    LoginInput:
      type: object
      required:
        - email
        - senha
      properties:
        email:
          type: string

        senha:
          type: string

    Categoria:
      type: object
      properties:
        _id:
          type: string

        nome:
          type: string
          example: Alimentação

    Tipo:
      type: object
      properties:
        _id:
          type: string

        nome:
          type: string
          example: Receita

    Transacao:
      type: object
      properties:
        _id:
          type: string

        descricao:
          type: string
          example: Salário

        valor:
          type: number
          example: 3500

        natureza:
          type: string
          example: receita

        Usuario:
          type: string

        Categoria:
          type: string

        Tipo:
          type: string

    Meta:
      type: object
      properties:
        _id:
          type: string

        meta:
          type: number
          example: 5000

        mes:
          type: number
          example: 5

        ano:
          type: number
          example: 2026

        Usuario:
          type: string

security:
  - bearerAuth: []

paths:

  /usuario/registrar:
    post:
      tags:
        - Usuário

      summary: Registrar usuário

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'

      responses:
        '201':
          description: Usuário registrado com sucesso

        '400':
          description: Dados inválidos

        '500':
          description: Erro interno do servidor

  /usuario/login:
    post:
      tags:
        - Usuário

      summary: Login do usuário

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'

      responses:
        '200':
          description: Login realizado com sucesso

        '400':
          description: Credenciais inválidas

        '500':
          description: Erro interno do servidor

  /usuario/editar/{id}:
    put:
      tags:
        - Usuário

      summary: Editar usuário

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'

      responses:
        '200':
          description: Usuário atualizado

        '404':
          description: Usuário não encontrado

        '500':
          description: Erro interno

  /usuario/deletar/{id}:
    delete:
      tags:
        - Usuário

      summary: Deletar usuário

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Usuário removido

        '404':
          description: Usuário não encontrado

        '500':
          description: Erro interno

  /usuario:
    get:
      tags:
        - Usuário

      summary: Listar usuários

      responses:
        '200':
          description: Lista de usuários

        '500':
          description: Erro interno

  /usuario/consultar/{id}:
    get:
      tags:
        - Usuário

      summary: Consultar usuário por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Usuário encontrado

        '404':
          description: Usuário não encontrado

        '500':
          description: Erro interno

  /transacao/criar:
    post:
      tags:
        - Transação

      summary: Criar transação

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transacao'

      responses:
        '201':
          description: Transação criada

        '400':
          description: Dados inválidos

        '500':
          description: Erro interno

  /transacao/editar/{id}:
