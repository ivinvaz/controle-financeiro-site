services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-node
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mongodb://mongodb:34045629@db:27017/controle?directConnection=true&authSource=admin
    restart: on-failure
    depends_on:
      - db

  db:
    image: mongodb/mongodb-atlas-local:latest
    container_name: mongodb-atlas-local
    ports:
      - "27017:27017"
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=mongodb
      - MONGODB_INITDB_ROOT_PASSWORD=34045629
    volumes:
      - mongo-data:/data/db
    deploy:
          resources:
            limits:
              memory: 1G

volumes:
  mongo-data: